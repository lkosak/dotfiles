# Disable escape delay that makes vim unusable
set -sg escape-time 0

# Index windows starting at 1 so jumping is more natural
set -g base-index 1

# Enable mouse reporting
set -g mouse on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# disable activity highlighting, which is kind of annoying
setw -g monitor-activity off

# renumber windows when a session closes
set -g renumber-windows on

# Vim-style scrollback/copy
setw -g mode-keys vi

# Claude code told me to do it
set -g focus-events on

# Maybe fix some issues with keys in vim
set-window-option -g xterm-keys on

# disable normal motion key navigation
unbind Up
unbind Down
unbind Left
unbind Right
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

# use the vim motion keys to move between panes
bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R

# Make splits open in the same PWD
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Status bar
set -g window-status-current-style 'bg=black,fg=white,bold'
set -g status-right '#{@note} [#(command -v battery &> /dev/null && battery -t)] %-m/%-d/%y %H:%M'

# OS X specific settings
if-shell 'test "$(uname)" = "Darwin"' 'source ~/.tmux/osx.conf'

# Colors
#source ~/.tmux/themes/solarized-dark.conf

# --- Claude Code suggested ---

# Match pane indexing to window base-index
set -g pane-base-index 1

# More scrollback history
set -g history-limit 50000

# Auto-rename windows to directory basename + current process
setw -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
#set -g automatic-rename-format "#{b:pane_current_path}:#{pane_current_command}"

# Push tmux info to terminal emulator title bar
set -g set-titles on
set -g set-titles-string "#S:#I — #W"

# --- Claude Code suggested: theme ---

# Status bar base
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " #S "
set -g status-left-style "bg=colour24,fg=white,bold"

# Window list
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=colour24,fg=white,bold"

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour24"
